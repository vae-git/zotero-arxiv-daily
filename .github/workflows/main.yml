name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.SILICONFLOW_API_KEY || secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: https://api.siliconflow.cn/v1
          OPENAI_MODEL: ${{ vars.SILICONFLOW_MODEL || vars.OPENAI_MODEL || 'Qwen/Qwen2.5-7B-Instruct' }}
        run: |
          OPENAI_API_BASE="${OPENAI_API_BASE%/}"
          if [[ "$OPENAI_API_BASE" == *"siliconflow.cn"* && "$OPENAI_API_BASE" != */v1 ]]; then
            export OPENAI_API_BASE="$OPENAI_API_BASE/v1"
          fi
          python - <<'PY'
          import os
          import urllib.error
          import urllib.request

          base_url = os.environ["OPENAI_API_BASE"].rstrip("/")
          print(f"LLM base_url={base_url}")
          print(f"LLM model={os.environ['OPENAI_MODEL']}")
          try:
              with urllib.request.urlopen(f"{base_url}/models", timeout=20) as response:
                  print(f"LLM connectivity precheck: HTTP {response.status}")
          except urllib.error.HTTPError as exc:
              print(f"LLM connectivity precheck: HTTP {exc.code} (network reachable)")
          except Exception as exc:
              print(f"LLM connectivity precheck failed: {type(exc).__name__}: {exc}")
          PY
          echo "Use checked-in config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py
