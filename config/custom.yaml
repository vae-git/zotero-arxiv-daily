zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: https://api.siliconflow.cn/v1
  generation_kwargs:
    model: ${oc.env:OPENAI_MODEL,Qwen/Qwen2.5-7B-Instruct}
    max_tokens: 512
    temperature: 0.2
  language: English and Chinese

source:
  arxiv:
    category: ["eess.SP","cs.IT","math.IT","eess.SY","physics.app-ph"]
    include_cross_list: true
  rf_rss:
    max_entries_per_feed: 5

reranker:
  top_k: 5
  nearest_weight: 0.7
  focus:
    enabled: true
    primary_keywords:
      - "rf power amplifier"
      - "radio frequency power amplifier"
      - "microwave power amplifier"
      - "mm-wave power amplifier"
      - "millimeter-wave power amplifier"
      - "power amplifier"
      - "power amplifiers"
      - "pa"
      - "digital predistortion"
      - "predistortion"
      - "dpd"
      - "linearization"
      - "doherty"
      - "load modulation"
      - "envelope tracking"
      - "outphasing"
    secondary_keywords:
      - "gan"
      - "gaas"
      - "cmos"
      - "bicmos"
      - "rf front-end"
      - "transmitter"
      - "mmwave"
      - "millimeter wave"
      - "microwave"
      - "efficiency"
      - "linearity"
      - "pae"
      - "aclr"
      - "back-off"
      - "backoff"
    ai_keywords:
      - "artificial intelligence"
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "reinforcement learning"
      - "bayesian optimization"
      - "data-driven"
      - "surrogate model"
      - "transformer"
      - "graph neural network"
      - "physics-informed"
    primary_boost_per_match: 0.14
    secondary_boost_per_match: 0.05
    ai_combo_boost: 0.45
    max_boost: 1.0
    no_primary_penalty: 0.35
    drop_without_primary: true

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv','rf_rss']
  send_empty: true
  max_paper_num: 12
